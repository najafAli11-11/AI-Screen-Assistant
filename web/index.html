<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Real-time multilingual screen guidance powered by Claude Vision. Ask questions about what's on your screen in Urdu, English, or Hindi." />
  <meta name="theme-color" content="#0a0a0f" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <title>AI Screen Assistant</title>
</head>
<body>
  <div id="root">
    <main style="font-family: 'Inter', system-ui, sans-serif; padding: 32px; color: #e8e8f0; background: #0a0a0f; min-height: 100vh; display: grid; place-items: center;">
      <div style="text-align: center;">
        <div style="width: 48px; height: 48px; border: 3px solid #2a2a3e; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px;"></div>
        <p style="color: #7a7a8f; font-size: 0.95rem;">Loading AI Screen Assistant...</p>
      </div>
      <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    </main>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
