server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets with long cache (Vite emits hashed filenames)
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback. This service only serves the built static frontend.
    # The browser calls the backend DIRECTLY using the VITE_API_URL that is
    # baked into the bundle at build time, so nginx does not proxy to the
    # backend and needs no knowledge of its address.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
